name: Verify build

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: build
        run: pnpm build

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: lint
        run: pnpm lint

  test-chrome:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: Install Playwright Browsers
        run: pnpm --filter ./libs/* exec playwright install chromium

      - name: test
        run: pnpm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-firefox:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: Install Playwright Browsers
        run: pnpm --filter ./libs/* exec playwright install firefox

      - name: test
        run: pnpm test --browsers=firefoxHeadless --no-coverage

  test-safari:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: Install Playwright Browsers
        run: pnpm --filter ./libs/* exec playwright install webkit --with-deps

      - name: test
        run: pnpm test --browsers=webkitHeadless --no-coverage

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        name: Install pnpm
        with:
          run_install: false

      - name: install
        run: pnpm ci

      - name: Check formatting
        run: pnpm format-check
