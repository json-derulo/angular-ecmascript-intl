packages:
  - libs/*
  - demo

allowBuilds:
  '@parcel/watcher': false
  esbuild: false
  less: false
  lmdb: false
  msgpackr-extract: false
  rollup: false

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@angular/*'
  - '@angular-devkit/*'
  - '@schematics/angular'
  - ng-packagr

catalog:
  '@angular/build': '22.0.6'
  '@angular/cdk': '22.0.4'
  '@angular/cli': '22.0.6'
  '@angular/common': '22.0.6'
  '@angular/compiler': '22.0.6'
  '@angular/compiler-cli': '22.0.6'
  '@angular/core': '22.0.6'
  '@angular/forms': '22.0.6'
  '@angular/material': '22.0.4'
  '@angular/platform-browser': '22.0.6'
  '@angular/router': '22.0.6'
  '@types/node': '24.13.3'
  '@vitest/browser-playwright': '4.1.10'
  '@vitest/coverage-v8': '4.1.10'
  angular-eslint: '22.1.0'
  cpy-cli: '7.0.0'
  dayjs: '1.11.21'
  eslint: '10.7.0'
  marked: '18.0.6'
  ng-packagr: '22.0.1'
  ngx-markdown: '22.0.0'
  oxfmt: '0.59.0'
  oxlint: '1.74.0'
  playwright: '1.61.1'
  prismjs: '1.30.0'
  rxjs: '7.8.2'
  tslib: '2.8.1'
  typescript: '6.0.3'
  typescript-eslint: '8.63.0'
  vitest: '4.1.10'
  zone.js: '0.16.2' # without this, the tests fail since Angular v22

dedupePeers: true

overrides:
  sass: ^1.99.0 # without this, timeouts may occur in the tests
